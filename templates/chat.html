<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee House Chat System - {{ room }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="chat-body">
    <div class="chat-layout">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="chat-sidebar glass-panel" id="chat-sidebar">
            <div class="sidebar-header">
                <h2>Coffee House Chat System</h2>
                <div class="room-badge">Room: {{ room }}</div>
            </div>
            <div class="sidebar-info">
                <h3>Participants</h3>
                <div class="members-count">
                    <span class="pulse-dot"></span>
                    <span id="members-count">1</span> Online
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="current-user">
                    <div class="avatar">{{ name[0] | upper }}</div>
                    <span class="user-name">{{ name }}</span>
                </div>
                <a href="{{ url_for('index') }}" class="btn btn-leave">Leave Room</a>
            </div>
        </aside>

        <main class="chat-main">
            <div class="chat-header glass-panel">
                <div class="mobile-header">
                    <button id="menu-toggle" class="btn-menu">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <h2>Coffee House</h2>
                    <a href="{{ url_for('index') }}" class="btn btn-leave btn-sm">Leave</a>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be injected here via JS -->
            </div>

            <div class="chat-input-area glass-panel">
                <form id="message-form" class="message-form">
                    <input type="text" id="message-input" placeholder="Type your message here..." autocomplete="off">
                    <button type="submit" class="btn btn-send">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Pass Python variables to JS -->
    <script type="text/javascript">
        const currentUser = "{{ name }}";
        const currentRoom = "{{ room }}";
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
